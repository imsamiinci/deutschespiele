<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2 Adjektivdeklination: Profi-Modus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #2d3436;
            --success: #00b894;
            --error: #ff7675;
            --bg: #dfe6e9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-card {
            background: white;
            width: 500px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
        }

        .timer-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: var(--primary);
            transition: width 1s linear;
        }

        .info-tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tag {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            background: var(--secondary);
            color: white;
        }

        .sentence-box {
            font-size: 1.4rem;
            margin: 30px 0;
            min-height: 80px;
            color: var(--dark);
        }

        .highlight {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
            padding: 0 5px;
            font-weight: bold;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .opt-btn {
            padding: 15px;
            border: 2px solid #eee;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .opt-btn:hover {
            border-color: var(--primary);
            background: #f8f7ff;
        }

        .opt-btn.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .opt-btn.wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        .results-screen { display: none; }
        
        .stat-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            font-size: 1.5rem;
            font-weight: bold;
        }

        #next-btn {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

<div class="game-card animate__animated animate__fadeInDown" id="main-card">
    <div id="game-ui">
        <div class="timer-container">
            <div id="timer-bar"></div>
        </div>
        
        <div class="info-tags">
            <span class="tag" id="tag-art">Artikel</span>
            <span class="tag" id="tag-case">Kasus</span>
            <span class="tag" id="tag-gen">Genus</span>
        </div>

        <div class="sentence-box" id="sentence">
            Lade Frage...
        </div>

        <div class="options-grid" id="options">
            </div>

        <button id="next-btn" onclick="nextQuestion()">Nächste Frage</button>
        
        <p style="margin-top: 20px; font-size: 0.8rem;">Frage <span id="q-num">1</span>/10</p>
    </div>

    <div class="results-screen" id="results-ui">
        <h1>Ergebnis 📊</h1>
        <div class="stat-circle">
            <span id="score-val">0</span>
            <small style="font-size: 0.6rem;">PUNKTE</small>
        </div>
        <p id="stats-text"></p>
        <button class="opt-btn" style="width: 100%; background: var(--primary); color: white;" onclick="location.reload()">Nochmal spielen</button>
    </div>
</div>

<script>
    const data = {
        endings: ["e", "en", "er", "es", "em"],
        questions: [
            { s: "Trotz d___ schlecht___ Wetter___ sind wir gewandert.", a: "en", art: "Bestimmt", case: "Genitiv", gen: "Maskulin" },
            { s: "Wegen ein___ dumm___ Fehler___ verlor er das Spiel.", a: "en", art: "Unbestimmt", case: "Genitiv", gen: "Maskulin" },
            { s: "Ich helfe mein___ alt___ Nachbarin.", a: "en", art: "Possessiv", case: "Dativ", gen: "Feminin" },
            { s: "Er trinkt gern kalt___ Wasser.", a: "es", art: "Nullartikel", case: "Akkusativ", gen: "Neutrum" },
            { s: "Das ist ein___ großartig___ Film!", a: "er", art: "Unbestimmt", case: "Nominativ", gen: "Maskulin" },
            { s: "In d___ modern___ Stadt gibt es viel Lärm.", a: "en", art: "Bestimmt", case: "Dativ", gen: "Feminin" },
            { s: "Ohne dein___ neu___ Hilfe schaffe ich das nicht.", e: "e", a: "e", art: "Possessiv", case: "Akkusativ", gen: "Feminin" },
            { s: "Die Meinungen viel___ jung___ Leute sind wichtig.", a: "er", art: "Nullartikel", case: "Genitiv", gen: "Plural" },
            { s: "Ich habe kein___ gut___ Grund dafür.", a: "en", art: "Negativ", case: "Akkusativ", gen: "Maskulin" },
            { s: "Das Kind spielt mit d___ neu___ Ball.", a: "en", art: "Bestimmt", case: "Dativ", gen: "Maskulin" }
        ]
    };

    let currentQ = 0;
    let score = 0;
    let timer;
    let timeLeft = 20;
    let canAnswer = true;
    let correctCount = 0;

    function startTimer() {
        timeLeft = 20;
        document.getElementById('timer-bar').style.width = '100%';
        document.getElementById('timer-bar').style.background = 'var(--primary)';
        
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            let width = (timeLeft / 20) * 100;
            document.getElementById('timer-bar').style.width = width + '%';
            
            if (timeLeft <= 5) document.getElementById('timer-bar').style.background = 'var(--error)';
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                revealCorrect("Zeit abgelaufen!");
            }
        }, 1000);
    }

    function loadQuestion() {
        if (currentQ >= 10) return showResults();
        
        canAnswer = true;
        const q = data.questions[currentQ];
        const displaySentence = q.s.replace('___', '<span class="highlight">...</span>');
        
        document.getElementById('sentence').innerHTML = displaySentence;
        document.getElementById('tag-art').innerText = q.art;
        document.getElementById('tag-case').innerText = q.case;
        document.getElementById('tag-gen').innerText = q.gen;
        document.getElementById('q-num').innerText = currentQ + 1;
        document.getElementById('next-btn').style.display = 'none';
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        data.endings.forEach(end => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn animate__animated animate__fadeInUp';
            btn.innerText = `-${end}`;
            btn.onclick = () => checkAnswer(end, btn);
            optionsDiv.appendChild(btn);
        });

        startTimer();
    }

    function checkAnswer(choice, btn) {
        if (!canAnswer) return;
        canAnswer = false;
        clearInterval(timer);
        
        const correct = data.questions[currentQ].a;
        
        if (choice === correct) {
            btn.classList.add('correct');
            score += (timeLeft * 2); // Kalan süreye göre bonus puan
            correctCount++;
            triggerAnimation('animate__pulse');
        } else {
            btn.classList.add('wrong');
            triggerAnimation('animate__shakeX');
            revealCorrect();
        }
        
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function revealCorrect(msg) {
        const correct = data.questions[currentQ].a;
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => {
            if (b.innerText === `-${correct}`) b.classList.add('correct');
            b.disabled = true;
        });
        if(msg) document.getElementById('sentence').innerHTML += `<br><small style="color:red">${msg}</small>`;
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function triggerAnimation(className) {
        const card = document.getElementById('main-card');
        card.classList.add(className);
        setTimeout(() => card.classList.remove(className), 500);
    }

    function nextQuestion() {
        currentQ++;
        loadQuestion();
    }

    function showResults() {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('results-ui').style.display = 'block';
        document.getElementById('score-val').innerText = score;
        document.getElementById('stats-text').innerText = `${correctCount} doğru, ${10 - correctCount} yanlış.`;
        triggerAnimation('animate__backInUp');
    }

    loadQuestion();
</script>

</body>
</html>
