<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2 – Dativ Test</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2ff;--surface:#fff;--border:#e2e6f5;
  --text:#1e1e3c;--muted:#6b7599;
  --accent:#4f6ef7;--accent2:#7c3aed;
  --green:#22c55e;--green-bg:#dcfce7;--green-txt:#14532d;
  --red:#ef4444;--red-bg:#fee2e2;--red-txt:#7f1d1d;
  --amber-bg:#fefce8;--amber-bd:#fde047;--amber-txt:#713f12;
  --r-sm:10px;--r-md:14px;--r-lg:20px;
  --shadow:0 4px 28px rgba(79,110,247,.11);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:clamp(.75rem,3vw,2rem) clamp(.75rem,3vw,1.25rem) 3rem}
.page-hd{text-align:center;margin-bottom:clamp(.9rem,2.5vw,1.5rem);animation:fadeDown .5s ease both}
.page-hd h1{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,5vw,2.1rem);color:var(--accent);margin-bottom:.2rem}
.page-hd p{font-size:clamp(.76rem,2.3vw,.9rem);color:var(--muted);font-weight:600}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow);width:100%;max-width:580px;animation:fadeUp .45s ease both;overflow:hidden}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:clamp(.65rem,2.5vw,.95rem) clamp(.75rem,3vw,1.2rem);border-bottom:1.5px solid var(--border);gap:.4rem;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:40px}
.stat-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.stat-val{font-family:'Fredoka One',cursive;font-size:clamp(1rem,3.5vw,1.4rem);color:var(--text);line-height:1}
.stat-val.accent{color:var(--accent)}.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}
.lives{display:flex;gap:3px;align-items:center}
.heart{width:clamp(14px,3.2vw,18px);height:clamp(14px,3.2vw,18px);transition:transform .25s,opacity .25s}
.heart.gone{opacity:.2;transform:scale(.75)}
.heart svg{width:100%;height:100%}
.cat-strip{padding:.5rem clamp(.75rem,3vw,1.2rem);border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cat-chip{font-size:clamp(10px,2.3vw,12px);font-weight:800;border-radius:999px;padding:3px clamp(8px,2vw,13px);border:1.5px solid;letter-spacing:.02em}
.cat-chip.c1{background:#ede9fe;border-color:#c4b5fd;color:#4c1d95}
.cat-chip.c2{background:#dbeafe;border-color:#93c5fd;color:#1e3a8a}
.cat-chip.c3{background:#dcfce7;border-color:#86efac;color:#14532d}
.cat-chip.c4{background:#fef3c7;border-color:#fcd34d;color:#78350f}
.cat-chip.c5{background:#ffe4e6;border-color:#fca5a5;color:#881337}
.cat-chip.c6{background:#e0e7ff;border-color:#a5b4fc;color:#312e81}
.wem-tag{margin-left:auto;font-size:clamp(10px,2.3vw,12px);font-weight:800;color:var(--accent);background:rgba(79,110,247,.08);border:1.5px solid rgba(79,110,247,.2);border-radius:999px;padding:3px clamp(8px,2vw,13px);white-space:nowrap}
.prog-wrap{padding:.5rem clamp(.75rem,3vw,1.2rem);border-bottom:1.5px solid var(--border)}
.prog-track{height:6px;background:var(--bg);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.q-body{padding:clamp(.9rem,3vw,1.4rem) clamp(.75rem,3vw,1.2rem);animation:cardSlide .35s cubic-bezier(.34,1.56,.64,1)}
.q-num{font-size:clamp(10px,2.3vw,12px);font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.5rem}
.q-text{font-size:clamp(1rem,3.5vw,1.18rem);font-weight:700;color:var(--text);line-height:1.65;margin-bottom:.5rem}
.blank{display:inline-block;min-width:80px;border-bottom:2.5px solid var(--muted);color:var(--muted);text-align:center;padding:0 6px;transition:all .25s;font-weight:800;vertical-align:bottom}
.blank.correct{color:var(--green-txt);border-color:var(--green)}
.blank.wrong{color:var(--red-txt);border-color:var(--red);text-decoration:line-through}
.clue-box{display:inline-flex;align-items:center;gap:6px;background:var(--amber-bg);border:1.5px solid var(--amber-bd);border-radius:999px;padding:4px clamp(10px,2.5vw,14px);font-size:clamp(11px,2.5vw,13px);font-weight:700;color:var(--amber-txt);margin-bottom:clamp(.85rem,3vw,1.2rem)}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:clamp(.75rem,3vw,1rem)}
.opt{display:flex;align-items:center;gap:10px;padding:clamp(11px,2.8vw,14px) clamp(12px,3vw,16px);border-radius:var(--r-sm);border:2px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Nunito',sans-serif;font-size:clamp(.88rem,3vw,1rem);font-weight:700;color:var(--text);transition:all .18s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;touch-action:manipulation;text-align:left}
.opt:hover:not(:disabled){background:rgba(79,110,247,.06);border-color:var(--accent);transform:translateX(4px)}
.opt:active:not(:disabled){transform:scale(.98)}
.opt:disabled{cursor:default}
.opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green-txt);animation:correctPop .35s ease}
.opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red-txt);animation:wrongShake .35s ease}
.opt.reveal{background:var(--green-bg);border-color:var(--green);color:var(--green-txt)}
.opt-letter{width:26px;height:26px;border-radius:50%;background:rgba(79,110,247,.09);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:900;color:var(--accent);flex-shrink:0;transition:background .15s}
.opt.correct .opt-letter{background:rgba(34,197,94,.2);color:var(--green-txt)}
.opt.wrong .opt-letter{background:rgba(239,68,68,.2);color:var(--red-txt)}
.opt.reveal .opt-letter{background:rgba(34,197,94,.2);color:var(--green-txt)}
.tip-box{background:var(--amber-bg);border:1.5px solid var(--amber-bd);border-radius:var(--r-sm);padding:clamp(.6rem,2.5vw,.85rem) clamp(.75rem,3vw,1rem);font-size:clamp(12px,2.6vw,13px);font-weight:600;color:var(--amber-txt);line-height:1.55;display:none;margin-bottom:.75rem}
.tip-box strong{font-weight:800}
.feedback{min-height:20px;font-size:clamp(12px,2.6vw,13px);font-weight:700;text-align:center;color:var(--muted);margin-bottom:.55rem;transition:color .2s}
.feedback.ok{color:#16a34a}.feedback.err{color:#dc2626}
.next-btn{display:none;width:100%;padding:clamp(10px,2.5vw,13px);border-radius:var(--r-sm);border:2px solid rgba(79,110,247,.25);background:rgba(79,110,247,.08);font-family:'Nunito',sans-serif;font-size:clamp(.85rem,3vw,.97rem);font-weight:800;color:var(--accent);cursor:pointer;transition:all .18s}
.next-btn:hover{background:rgba(79,110,247,.15);border-color:var(--accent)}
.result-body{padding:clamp(1.25rem,4vw,2rem) clamp(.9rem,3vw,1.4rem);text-align:center;display:none}
.res-emoji{font-size:clamp(46px,12vw,62px);display:block;margin-bottom:.65rem;animation:popIn .55s cubic-bezier(.34,1.56,.64,1)}
.res-title{font-family:'Fredoka One',cursive;font-size:clamp(1.2rem,4.5vw,1.7rem);color:var(--text);margin-bottom:.3rem}
.res-sub{font-size:clamp(.78rem,2.6vw,.9rem);color:var(--muted);font-weight:600;margin-bottom:1rem}
.score-bar-wrap{background:var(--bg);border-radius:999px;height:8px;margin-bottom:1rem;overflow:hidden}
.score-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--green));width:0%;transition:width 1.1s cubic-bezier(.34,1.56,.64,1) .1s}
.cat-breakdown{background:var(--bg);border-radius:var(--r-md);padding:clamp(.75rem,3vw,1rem);margin-bottom:1rem;text-align:left}
.cat-breakdown h3{font-size:clamp(10px,2.3vw,12px);font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.65rem}
.cat-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:clamp(12px,2.6vw,13px)}
.cat-row-label{font-weight:700;color:var(--text);min-width:clamp(100px,28vw,145px);font-size:clamp(10px,2.2vw,12px)}
.cat-bar-track{flex:1;height:8px;background:var(--border);border-radius:999px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s ease .2s}
.cat-pct{font-weight:800;color:var(--accent);font-size:clamp(11px,2.4vw,12px);min-width:32px;text-align:right}
.badge-row{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}
.badge{font-size:clamp(11px,2.4vw,12px);font-weight:700;padding:5px clamp(10px,3vw,14px);border-radius:999px;border:1.5px solid var(--border);color:var(--muted);background:var(--bg)}
.badge.earned{background:var(--green-bg);border-color:var(--green);color:var(--green-txt);animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
.restart-btn{padding:clamp(10px,2.5vw,13px) clamp(22px,5vw,34px);border-radius:var(--r-sm);border:2px solid var(--border);background:var(--surface);font-family:'Nunito',sans-serif;font-size:clamp(.85rem,3vw,.97rem);font-weight:800;color:var(--text);cursor:pointer;transition:all .18s}
.restart-btn:hover{background:var(--bg);border-color:var(--accent);color:var(--accent)}
.flash-ov{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0;transition:opacity .15s}
.flash-ov.ok-fl{background:rgba(34,197,94,.1)}.flash-ov.err-fl{background:rgba(239,68,68,.1)}.flash-ov.show{opacity:1}
.score-pop{position:fixed;pointer-events:none;z-index:9999;font-family:'Fredoka One',cursive;font-size:1.7rem;color:var(--accent);text-shadow:0 2px 8px rgba(79,110,247,.3);animation:scorePop 1s ease-out forwards}
@keyframes scorePop{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-70px);opacity:0}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes cardSlide{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div class="flash-ov" id="flash-ov"></div>
<header class="page-hd">
  <h1>🎯 Dativ Test</h1>
  <p>45 Soru · Wem? · A2 Deutsch</p>
</header>
<div class="card" id="main-card">
  <div class="top-bar">
    <div class="stat"><span class="stat-lbl">Puan</span><span class="stat-val accent" id="score">0</span></div>
    <div class="lives" id="lives"></div>
    <div class="stat"><span class="stat-lbl">Doğru</span><span class="stat-val green" id="correct-cnt">0</span></div>
    <div class="stat"><span class="stat-lbl">Yanlış</span><span class="stat-val red" id="wrong-cnt">0</span></div>
    <div class="stat"><span class="stat-lbl">Soru</span><span class="stat-val" id="qnum">1/45</span></div>
  </div>
  <div class="cat-strip">
    <div class="cat-chip" id="cat-chip">Kategori</div>
    <div class="wem-tag">❓ Wem?</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  </div>
  <div class="q-body" id="q-body">
    <div class="q-num" id="q-num">Frage 1 von 45</div>
    <div class="q-text" id="q-text"></div>
    <div class="clue-box" id="clue-box">💡 <span id="clue-text">Wem? → Dativ</span></div>
    <div class="opts" id="opts"></div>
    <div class="tip-box" id="tip-box"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">Weiter →</button>
  </div>
  <div class="result-body" id="result-body">
    <span class="res-emoji" id="res-emoji">🏆</span>
    <h2 class="res-title" id="res-title"></h2>
    <p class="res-sub" id="res-sub"></p>
    <div class="score-bar-wrap"><div class="score-bar-fill" id="score-bar"></div></div>
    <div class="cat-breakdown"><h3>📊 Kategoriye Göre Sonuçlar</h3><div id="cat-bars"></div></div>
    <div class="badge-row" id="badge-row"></div>
    <button class="restart-btn" onclick="restart()">🔄 Nochmal spielen</button>
  </div>
</div>
<script>
const CATS=[
  {id:'c1',label:'Personalpronomen',cls:'c1'},
  {id:'c2',label:'Bestimmter Artikel',cls:'c2'},
  {id:'c3',label:'Unbestimmter Artikel',cls:'c3'},
  {id:'c4',label:'Dativ-Verben',cls:'c4'},
  {id:'c5',label:'Dativ-Präpositionen',cls:'c5'},
  {id:'c6',label:'Gemischte Sätze',cls:'c6'},
];
const QUESTIONS=[
  {cat:'c1',q:'Kannst du ___ helfen? (ich)',hint:'Wem hilfst du? → Dativ von "ich"',opts:['ich','mich','mir','mein'],r:2,tip:'<strong>ich → mir</strong> im Dativ. "Helfen" verlangt immer Dativ!'},
  {cat:'c1',q:'Ich schenke ___ ein Buch. (du)',hint:'Wem schenkst du das Buch? → Dativ von "du"',opts:['du','dich','dein','dir'],r:3,tip:'<strong>du → dir</strong> im Dativ.'},
  {cat:'c1',q:'Das gehört ___. (er)',hint:'Wem gehört es? → Dativ von "er"',opts:['er','ihn','ihm','sein'],r:2,tip:'<strong>er → ihm</strong> im Dativ. "Gehören" verlangt Dativ.'},
  {cat:'c1',q:'Ich gebe ___ die Schlüssel. (sie – singular)',hint:'Wem gibst du die Schlüssel?',opts:['sie','ihr','ihren','ihre'],r:1,tip:'<strong>sie (sg.) → ihr</strong> im Dativ.'},
  {cat:'c1',q:'Er erklärt ___ die Aufgabe. (wir)',hint:'Wem erklärt er?',opts:['wir','uns','unser','wir uns'],r:1,tip:'<strong>wir → uns</strong> im Dativ.'},
  {cat:'c1',q:'Die Lehrerin zeigt ___ die Lösung. (sie – plural)',hint:'Wem zeigt sie?',opts:['sie','ihnen','ihre','ihr'],r:1,tip:'<strong>sie (Pl.) → ihnen</strong> im Dativ. Kleingeschrieben!'},
  {cat:'c1',q:'Ich bringe ___ den Kaffee. (ihr – 2. Pers. Pl.)',hint:'Wem bringst du?',opts:['ihr','euch','ihre','euer'],r:1,tip:'<strong>ihr → euch</strong> im Dativ.'},
  {cat:'c1',q:'Das Foto gehört ___. (es)',hint:'Wem gehört das Foto?',opts:['es','ihn','ihm','sein'],r:2,tip:'<strong>es → ihm</strong> im Dativ. (Wie "er"!)'},
  {cat:'c1',q:'Kann ich ___ behilflich sein? (Sie – formell)',hint:'Dativ von "Sie" (formell)',opts:['Sie','Ihnen','Ihren','Ihrer'],r:1,tip:'<strong>Sie (formell) → Ihnen</strong> im Dativ. Großgeschrieben!'},
  {cat:'c2',q:'Ich gebe ___ Mann das Buch.',hint:'der Mann → Dativ: dem/der/den?',opts:['der Mann','den Mann','dem Mann','die Mann'],r:2,tip:'<strong>der → dem</strong> im Dativ (maskulin & neutral).'},
  {cat:'c2',q:'Sie hilft ___ Frau.',hint:'die Frau → Dativ',opts:['die Frau','der Frau','den Frau','dem Frau'],r:1,tip:'<strong>die → der</strong> im Dativ (feminin).'},
  {cat:'c2',q:'Er zeigt ___ Kind den Weg.',hint:'das Kind → Dativ',opts:['das Kind','den Kind','dem Kind','der Kind'],r:2,tip:'<strong>das → dem</strong> im Dativ (neutral).'},
  {cat:'c2',q:'Wir danken ___ Lehrer.',hint:'"danken" + Dativ. der Lehrer → ?',opts:['der Lehrer','den Lehrer','dem Lehrer','die Lehrer'],r:2,tip:'<strong>der → dem</strong>. "Danken" verlangt immer Dativ!'},
  {cat:'c2',q:'Das Geschenk gehört ___ Mutter.',hint:'die Mutter → Dativ',opts:['die Mutter','der Mutter','dem Mutter','den Mutter'],r:1,tip:'<strong>die → der</strong> im Dativ (feminin).'},
  {cat:'c2',q:'Ich schreibe ___ Direktor einen Brief.',hint:'der Direktor → Dativ',opts:['der Direktor','des Direktors','dem Direktor','den Direktor'],r:2,tip:'<strong>der → dem</strong> im Dativ.'},
  {cat:'c2',q:'Sie vertraut ___ Arzt.',hint:'"vertrauen" + Dativ. der Arzt → ?',opts:['der Arzt','den Arzt','dem Arzt','des Arztes'],r:2,tip:'<strong>der → dem</strong>. "Vertrauen" + Dativ.'},
  {cat:'c2',q:'Er gibt ___ Hund Futter.',hint:'der Hund → Dativ',opts:['der Hund','den Hund','dem Hund','des Hundes'],r:2,tip:'<strong>der → dem</strong> im Dativ (maskulin).'},
  {cat:'c2',q:'Wir folgen ___ Gruppe.',hint:'die Gruppe → Dativ. "folgen" + ?',opts:['die Gruppe','der Gruppe','den Gruppe','dem Gruppe'],r:1,tip:'<strong>die → der</strong>. "Folgen" verlangt Dativ!'},
  {cat:'c3',q:'Ich helfe ___ Freund. (ein)',hint:'ein Freund (m.) → Dativ: einem/einer?',opts:['ein Freund','einen Freund','einem Freund','eines Freundes'],r:2,tip:'<strong>ein (m.) → einem</strong> im Dativ.'},
  {cat:'c3',q:'Sie gibt ___ Kollegin ein Geschenk. (eine)',hint:'eine Kollegin (f.) → Dativ',opts:['eine Kollegin','einer Kollegin','einem Kollegin','einen Kollegin'],r:1,tip:'<strong>eine (f.) → einer</strong> im Dativ.'},
  {cat:'c3',q:'Er antwortet ___ Schüler. (ein)',hint:'ein Schüler (m.) → Dativ',opts:['ein Schüler','einen Schüler','einem Schüler','eines Schülers'],r:2,tip:'<strong>ein (m.) → einem</strong> im Dativ.'},
  {cat:'c3',q:'Das schmeckt ___ Kind. (ein)',hint:'ein Kind (n.) → Dativ',opts:['ein Kind','einen Kind','einem Kind','einer Kind'],r:2,tip:'<strong>ein (n.) → einem</strong> im Dativ.'},
  {cat:'c3',q:'Ich gratuliere ___ Freundin. (eine)',hint:'"gratulieren" + Dativ. eine Freundin → ?',opts:['eine Freundin','einer Freundin','einem Freundin','einen Freundin'],r:1,tip:'<strong>eine (f.) → einer</strong>. "Gratulieren" + Dativ!'},
  {cat:'c3',q:'Er hilft ___ alten Dame. (eine)',hint:'eine alte Dame (f.) → Dativ',opts:['eine alte Dame','einer alten Dame','einem alten Dame','einen alten Dame'],r:1,tip:'<strong>eine → einer</strong>. Adjektiv bekommt "-en".'},
  {cat:'c3',q:'Wir zeigen ___ Touristen den Weg. (ein)',hint:'ein Tourist (m.) → Dativ',opts:['ein Tourist','einen Touristen','einem Touristen','eines Touristen'],r:2,tip:'<strong>ein (m.) → einem</strong>. Tourist → N-Deklination!'},
  {cat:'c3',q:'Das gehört ___ Studentin. (eine)',hint:'eine Studentin (f.) → Dativ',opts:['eine Studentin','einen Studentin','einem Studentin','einer Studentin'],r:3,tip:'<strong>eine (f.) → einer</strong> im Dativ.'},
  {cat:'c3',q:'Er schreibt ___ Freund eine Nachricht. (ein)',hint:'ein Freund (m.) → Dativ',opts:['ein Freund','einen Freund','einem Freund','einer Freund'],r:2,tip:'<strong>ein (m.) → einem</strong> im Dativ.'},
  {cat:'c4',q:'Diese Hose passt ___ nicht. (ich)',hint:'"passen" + Dativ. Wem passt sie?',opts:['mich','ich','mir','mein'],r:2,tip:'<strong>passen + Dativ:</strong> "Die Hose passt <u>mir</u>."'},
  {cat:'c4',q:'Das Essen schmeckt ___ sehr gut. (du)',hint:'"schmecken" + Dativ. Wem schmeckt es?',opts:['dich','du','dein','dir'],r:3,tip:'<strong>schmecken + Dativ:</strong> "Es schmeckt <u>dir</u>."'},
  {cat:'c4',q:'Mein Rücken tut ___ weh. (ich)',hint:'"wehtun" + Dativ. Wem tut es weh?',opts:['mich','mir','ich','mein'],r:1,tip:'<strong>wehtun + Dativ:</strong> "Es tut <u>mir</u> weh."'},
  {cat:'c4',q:'Wir gratulieren ___ zum Geburtstag. (du)',hint:'"gratulieren" + Dativ.',opts:['dich','du','dir','dein'],r:2,tip:'<strong>gratulieren + Dativ:</strong> "Wir gratulieren <u>dir</u>."'},
  {cat:'c4',q:'Das Fahrrad gehört ___. (sie – singular)',hint:'"gehören" + Dativ.',opts:['sie','ihre','ihr','ihren'],r:2,tip:'<strong>gehören + Dativ:</strong> "Es gehört <u>ihr</u>."'},
  {cat:'c4',q:'Ich vertraue ___ vollständig. (er)',hint:'"vertrauen" + Dativ.',opts:['er','ihn','sein','ihm'],r:3,tip:'<strong>vertrauen + Dativ:</strong> "Ich vertraue <u>ihm</u>."'},
  {cat:'c5',q:'Ich fahre mit ___ Bus.',hint:'"mit" verlangt immer Dativ! der Bus → ?',opts:['den Bus','der Bus','dem Bus','die Bus'],r:2,tip:'<strong>mit + Dativ:</strong> mit dem Bus, mit der Bahn.'},
  {cat:'c5',q:'Er kommt aus ___ Türkei.',hint:'"aus" verlangt immer Dativ!',opts:['die Türkei','der Türkei','dem Türkei','den Türkei'],r:1,tip:'<strong>aus + Dativ:</strong> aus der Türkei, aus dem Haus.'},
  {cat:'c5',q:'Sie wohnt bei ___ Großeltern.',hint:'"bei" + Dativ. die Großeltern (Pl.) → ?',opts:['die Großeltern','der Großeltern','den Großeltern','dem Großeltern'],r:2,tip:'<strong>bei + Dativ:</strong> bei den Großeltern. Plural → "den".'},
  {cat:'c5',q:'Nach ___ Essen trinken wir Kaffee.',hint:'"nach" + Dativ. das Essen (n.) → ?',opts:['das Essen','den Essen','dem Essen','der Essen'],r:2,tip:'<strong>nach + Dativ:</strong> nach dem Essen.'},
  {cat:'c5',q:'Ich lerne seit ___ Jahr Deutsch.',hint:'"seit" + Dativ. ein Jahr (n.) → ?',opts:['ein Jahr','einen Jahr','einem Jahr','einer Jahr'],r:2,tip:'<strong>seit + Dativ:</strong> seit einem Jahr, seit einer Woche.'},
  {cat:'c5',q:'Wir gehen zu ___ Supermarkt.',hint:'"zu" + Dativ. der Supermarkt → ?',opts:['der Supermarkt','den Supermarkt','dem Supermarkt','des Supermarkts'],r:2,tip:'<strong>zu + Dativ:</strong> zum (= zu dem) Supermarkt!'},
  {cat:'c6',q:'Ich erkläre ___ die Grammatik. (der Student)',hint:'Wem erklärst du? der Student → Dativ',opts:['den Studenten','der Student','dem Studenten','des Studenten'],r:2,tip:'<strong>der Student → dem Studenten</strong>. N-Deklination + Dativ!'},
  {cat:'c6',q:'Das Medikament hilft ___ (die Patienten – Pl.)',hint:'"helfen" + Dativ. Plural "die" → Dativ?',opts:['die Patienten','der Patienten','den Patienten','dem Patienten'],r:2,tip:'<strong>Plural Dativ: die → den</strong>.'},
  {cat:'c6',q:'Sie schickt ___ eine E-Mail. (ihre Eltern)',hint:'Wem? ihre Eltern (Pl.) → Dativ?',opts:['ihre Eltern','ihrer Eltern','ihren Eltern','ihrem Eltern'],r:2,tip:'<strong>ihre (Pl.) → ihren</strong> im Dativ.'},
  {cat:'c6',q:'Wir wohnen gegenüber ___ Bahnhof.',hint:'"gegenüber" + Dativ! der Bahnhof → ?',opts:['den Bahnhof','der Bahnhof','des Bahnhofs','dem Bahnhof'],r:3,tip:'<strong>gegenüber + Dativ:</strong> gegenüber dem Bahnhof.'},
  {cat:'c6',q:'Er erzählt ___ eine Geschichte. (wir)',hint:'Wem erzählt er? Dativ von "wir"',opts:['wir','unser','uns','unseren'],r:2,tip:'<strong>wir → uns</strong> im Dativ.'},
  {cat:'c6',q:'Das Kleid steht ___ sehr gut. (du)',hint:'"stehen" (kleiden) + Dativ.',opts:['dich','du','dein','dir'],r:3,tip:'<strong>stehen (= jdm. gut stehen) + Dativ:</strong> "Es steht <u>dir</u> gut."'},
];
const BADGE_DEFS=[
  {id:'b10',label:'⭐ İlk 10',thr:10},
  {id:'b100',label:'🏅 Yüz Puan',thr:100},
  {id:'b250',label:'🎓 Dativ Ustası',thr:250},
  {id:'b350',label:'💎 Expert',thr:350},
  {id:'b450',label:'🏆 Dativ Champion!',thr:450},
];
const OPT_LETTERS=['A','B','C','D'];
let qi=0,score=0,lives=5,correctCnt=0,wrongCnt=0,badges=[];
let catStats={};
CATS.forEach(c=>{catStats[c.id]={ok:0,total:0}});
function buildOrder(){
  const groups={};
  CATS.forEach(c=>{groups[c.id]=[]});
  QUESTIONS.forEach((q,i)=>groups[q.cat].push(i));
  let order=[];
  CATS.forEach(c=>{order=order.concat(groups[c.id].slice().sort(()=>Math.random()-.5))});
  return order;
}
let ORDER=buildOrder();
function getQ(){return QUESTIONS[ORDER[qi]];}
function renderHearts(){
  const el=document.getElementById('lives');el.innerHTML='';
  for(let i=0;i<5;i++){
    const gone=i>=lives;
    el.innerHTML+=`<div class="heart ${gone?'gone':''}"><svg viewBox="0 0 24 24" fill="${gone?'#ccc':'#ef4444'}"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg></div>`;
  }
}
function renderQ(){
  if(qi>=ORDER.length){showResult();return;}
  const q=getQ();
  const cat=CATS.find(c=>c.id===q.cat);
  const body=document.getElementById('q-body');
  body.style.animation='none';void body.offsetWidth;
  body.style.animation='cardSlide .35s cubic-bezier(.34,1.56,.64,1)';
  const chip=document.getElementById('cat-chip');
  chip.textContent=cat.label;chip.className='cat-chip '+cat.cls;
  document.getElementById('prog-fill').style.width=(qi/ORDER.length*100)+'%';
  document.getElementById('qnum').textContent=`${qi+1}/${ORDER.length}`;
  document.getElementById('q-num').textContent=`Frage ${qi+1} von ${ORDER.length}`;
  document.getElementById('q-text').innerHTML=q.q.replace('___','<span class="blank" id="blank">___</span>');
  document.getElementById('clue-text').textContent=q.hint;
  document.getElementById('tip-box').style.display='none';
  document.getElementById('tip-box').innerHTML='';
  const fb=document.getElementById('feedback');fb.textContent='';fb.className='feedback';
  document.getElementById('next-btn').style.display='none';
  renderHearts();buildOpts(q);
  document.getElementById('score').textContent=score;
  document.getElementById('correct-cnt').textContent=correctCnt;
  document.getElementById('wrong-cnt').textContent=wrongCnt;
}
function buildOpts(q){
  const wrap=document.getElementById('opts');wrap.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="opt-letter">${OPT_LETTERS[i]}</span>${opt}`;
    btn.addEventListener('click',()=>checkAnswer(i,q));
    wrap.appendChild(btn);
  });
}
function checkAnswer(idx,q){
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const blank=document.getElementById('blank');
  const fb=document.getElementById('feedback');
  const tip=document.getElementById('tip-box');
  const ok=(idx===q.r);
  const btns=document.querySelectorAll('.opt');
  catStats[q.cat].total++;
  if(ok){
    btns[idx].classList.add('correct');
    blank.textContent=q.opts[q.r];blank.className='blank correct';
    fb.textContent='Richtig! ✓';fb.className='feedback ok';
    score+=10;correctCnt++;catStats[q.cat].ok++;
    BADGE_DEFS.forEach(b=>{if(score>=b.thr&&!badges.includes(b.id))badges.push(b.id)});
    flashOv('ok');showScorePop('+10');
  } else {
    btns[idx].classList.add('wrong');
    btns[q.r].classList.add('reveal');
    blank.textContent=q.opts[q.r];blank.className='blank wrong';
    fb.textContent=`Falsch. Richtig: „${q.opts[q.r]}"`;fb.className='feedback err';
    wrongCnt++;lives--;flashOv('err');
    if(lives<=0){setTimeout(showResult,700);return;}
  }
  tip.innerHTML='💡 '+q.tip;tip.style.display='block';
  document.getElementById('next-btn').style.display='block';
  document.getElementById('score').textContent=score;
  document.getElementById('correct-cnt').textContent=correctCnt;
  document.getElementById('wrong-cnt').textContent=wrongCnt;
  renderHearts();
}
function nextQ(){qi++;renderQ();}
function showResult(){
  document.getElementById('q-body').style.display='none';
  document.getElementById('result-body').style.display='block';
  const pct=Math.round(correctCnt/ORDER.length*100);
  let emoji,title,sub;
  if(pct>=85){emoji='🏆';title=`Ausgezeichnet! ${score} Punkte`;sub='Du beherrschst den Dativ wirklich gut!';}
  else if(pct>=60){emoji='👍';title=`Gut gemacht! ${score} Punkte`;sub='Noch etwas üben – du schaffst das!';}
  else{emoji='📚';title=`${score} Punkte`;sub='Dativ braucht Übung – versuch es nochmal!';}
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-sub').textContent=sub;
  setTimeout(()=>document.getElementById('score-bar').style.width=pct+'%',80);
  const barsEl=document.getElementById('cat-bars');barsEl.innerHTML='';
  CATS.forEach(cat=>{
    const s=catStats[cat.id];
    const p=s.total>0?Math.round(s.ok/s.total*100):0;
    barsEl.innerHTML+=`<div class="cat-row"><div class="cat-row-label">${cat.label}</div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:0%" data-pct="${p}"></div></div><div class="cat-pct">${p}%</div></div>`;
  });
  setTimeout(()=>{document.querySelectorAll('.cat-bar-fill').forEach(el=>{el.style.width=el.dataset.pct+'%'})},120);
  const row=document.getElementById('badge-row');row.innerHTML='';
  BADGE_DEFS.forEach(b=>{
    const d=document.createElement('div');
    d.className='badge'+(badges.includes(b.id)?' earned':'');
    d.textContent=b.label;row.appendChild(d);
  });
}
function restart(){
  qi=0;score=0;lives=5;correctCnt=0;wrongCnt=0;badges=[];
  CATS.forEach(c=>{catStats[c.id]={ok:0,total:0}});
  ORDER=buildOrder();
  document.getElementById('result-body').style.display='none';
  document.getElementById('q-body').style.display='block';
  renderQ();
}
function flashOv(type){
  const el=document.getElementById('flash-ov');
  el.className=`flash-ov ${type}-fl show`;
  setTimeout(()=>el.className=`flash-ov ${type}-fl`,340);
}
function showScorePop(txt){
  const p=document.createElement('div');p.className='score-pop';p.textContent=txt;
  p.style.cssText=`left:${44+Math.random()*12}%;top:45%;`;
  document.body.appendChild(p);setTimeout(()=>p.remove(),1000);
}
renderQ();
</script>
</body>
</html>
