<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2 Nominalisierung Spiel</title>
<style>
body{
font-family: Arial, sans-serif;
background:linear-gradient(135deg,#86efac,#93c5fd);
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{text-align:center}

.verb-sentence{
background:#eef2ff;
padding:15px;
border-radius:10px;
margin-bottom:20px;
font-size:20px;
}

.dropzone{
border:2px dashed #6366f1;
padding:15px;
min-height:60px;
border-radius:10px;
margin-bottom:20px;
}

.word-bank{
background:#f3f4f6;
padding:15px;
border-radius:10px;
}

.word{
display:inline-block;
padding:6px 10px;
margin:5px;
background:#4f46e5;
color:white;
border-radius:6px;
cursor:grab;
font-size:14px;
}

button{
margin-top:15px;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#16a34a;
color:white;
cursor:pointer;
}

button:hover{background:#15803d}

.feedback{
margin-top:15px;
font-weight:bold;
}

.score{
margin-top:15px;
font-size:18px;
text-align:center;
}

.example{
margin-top:10px;
font-size:14px;
color:#444;
}
</style>
</head>
<body>

<div class="container">
<h1>🎮 B2 Nominalisierung Spiel</h1>

<div class="verb-sentence" id="verbSentence"></div>

<p><b>Baue einen Nominalsatz:</b></p>

<div class="dropzone" id="dropzone"></div>

<div class="word-bank" id="words"></div>

<button onclick="check()">Antwort prüfen</button>
<button onclick="next()">Nächste Aufgabe</button>

<div class="feedback" id="feedback"></div>
<div class="example" id="example"></div>

<div class="score">⭐ Punkte: <span id="score">0</span></div>

</div>

<script>

const tasks=[
{
verb:"Er kommt zu spät, weil er den Bus verpasst hat.",
words:["Wegen","des","Verpassens","des","Busses","kommt","er","zu","spät"],
solution:"Wegen des Verpassens des Busses kommt er zu spät.",
note:"Verb → Nomen: verpasst → das Verpassen / des Verpassens"
},
{
verb:"Sie lernt viel, weil sie die Prüfung bestehen will.",
words:["Wegen","des","Bestehens","der","Prüfung","lernt","sie","viel"],
solution:"Wegen des Bestehens der Prüfung lernt sie viel.",
note:"Verb → Nomen: bestehen → das Bestehen"
},
{
verb:"Er arbeitet hart, weil er Erfolg haben möchte.",
words:["Für","den","Erfolg","arbeitet","er","hart"],
solution:"Für den Erfolg arbeitet er hart.",
note:"haben Erfolg → der Erfolg"
},
{
verb:"Sie fährt nach Berlin, um Deutsch zu lernen.",
words:["Zum","Lernen","von","Deutsch","fährt","sie","nach","Berlin"],
solution:"Zum Lernen von Deutsch fährt sie nach Berlin.",
note:"lernen → das Lernen"
},
{
verb:"Er blieb zu Hause, weil er krank war.",
words:["Wegen","der","Krankheit","blieb","er","zu","Hause"],
solution:"Wegen der Krankheit blieb er zu Hause.",
note:"krank → die Krankheit"
}
];

let current=0;
let score=0;

const dropzone=document.getElementById("dropzone");
const wordsDiv=document.getElementById("words");

function load(){
let task=tasks[current];

document.getElementById("verbSentence").innerText="Verbalsatz: "+task.verb;

dropzone.innerHTML="";
wordsDiv.innerHTML="";

task.words.forEach(w=>{
let span=document.createElement("span");
span.className="word";
span.draggable=true;
span.innerText=w;

span.ondragstart=(e)=>{
e.dataTransfer.setData("text",w);
};

wordsDiv.appendChild(span);
});
}


dropzone.ondragover=(e)=>{
e.preventDefault();
};


dropzone.ondrop=(e)=>{
e.preventDefault();
let word=e.dataTransfer.getData("text");

let span=document.createElement("span");
span.className="word";
span.innerText=word;

span.onclick=()=>span.remove();

 dropzone.appendChild(span);
};

function check(){
let words=[...dropzone.children].map(w=>w.innerText);
let sentence=words.join(" ");

let correct=tasks[current].solution;

if(sentence===correct.replace(".","")){
score+=10;

document.getElementById("feedback").innerHTML="✅ Richtig!";
document.getElementById("feedback").style.color="green";
}else{

document.getElementById("feedback").innerHTML="❌ Fast! Richtige Lösung:";
document.getElementById("feedback").style.color="red";
}

document.getElementById("example").innerText=correct+" — "+tasks[current].note;

document.getElementById("score").innerText=score;
}

function next(){
current++;

if(current>=tasks.length){
alert("Spiel beendet! Punkte: "+score);
current=0;
score=0;
}

load();
}

load();

</script>

</body>
</html>
