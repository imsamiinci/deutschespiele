<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐻 Passiv · Zeitformen verwandeln (B2)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Quicksand', 'Segoe UI', 'Comic Neue', cursive, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #e2f0e8 0%, #f5f3e9 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .spiel-wrapper {
      max-width: 1000px;
      width: 100%;
      background: #fefcf0;
      border-radius: 70px 70px 50px 50px;
      box-shadow: 0 20px 30px rgba(120, 100, 80, 0.25), 0 8px 15px rgba(0,0,0,0.1);
      padding: 30px 30px 40px;
      border: 5px solid #ffe3b5;
    }
    .kopf {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }
    .kopf h1 {
      font-size: 2.8rem;
      font-weight: 600;
      color: #3f6a5c;
      text-shadow: 4px 4px 0 #c8e6d9, 7px 7px 0 rgba(150, 190, 160, 0.4);
      background: #fafff5;
      display: inline-block;
      padding: 0.4rem 2.8rem;
      border-radius: 120px;
      border: 3px solid #bcd9c2;
      box-shadow: 0 10px 0 #8fa892;
      transform: rotate(-0.8deg);
      letter-spacing: -0.5px;
    }
    .kopf h1 span {
      font-size: 3.2rem;
      filter: drop-shadow(2px 4px 3px #aac0b0);
    }
    .untertitel {
      background: #dff0e3;
      padding: 0.7rem 2rem;
      border-radius: 50px;
      font-size: 1.3rem;
      color: #2d5e4c;
      border: 3px dashed #9bc0a8;
      width: fit-content;
      margin: 15px auto 0;
    }

    /* satzbereich */
    .arena {
      background: #fef9ea;
      border-radius: 60px 60px 30px 30px;
      padding: 25px 30px;
      border: 4px solid #ffdca8;
      box-shadow: inset 0 -5px 0 #ecc99a, 0 15px 15px -10px #cbb286;
      margin-bottom: 25px;
    }
    .aktueller-satz {
      background: #fff2da;
      border-radius: 50px;
      padding: 30px 20px;
      text-align: center;
      border: 3px solid #fbc490;
    }
    .aktueller-satz p {
      font-size: 2.2rem;
      font-weight: 600;
      color: #423d2b;
      word-break: break-word;
      background: #fffae9;
      padding: 0.7rem 1.8rem;
      border-radius: 70px;
      display: inline-block;
      box-shadow: 0 8px 0 #e6cbab;
    }
    .zeit-wahl {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .zeit-wahl label {
      font-size: 1.5rem;
      background: #b3d9c2;
      padding: 0.5rem 1.3rem;
      border-radius: 40px;
      color: #24473b;
      font-weight: 600;
      border: 2px solid #fff1cb;
    }
    select {
      font-size: 1.4rem;
      padding: 0.7rem 1.8rem;
      border-radius: 50px;
      border: 3px solid #f5bc70;
      background: #fffcf0;
      font-weight: 500;
      color: #3f3a2b;
      cursor: pointer;
      outline: none;
      box-shadow: 0 6px 0 #c49859;
      transition: 0.1s;
    }
    select:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #c49859;
    }
    .eingabe-bereich {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin: 30px 0 15px;
      align-items: center;
      justify-content: center;
    }
    .eingabe-bereich input {
      flex: 3 1 350px;
      font-size: 1.5rem;
      padding: 1rem 1.8rem;
      border-radius: 70px;
      border: 4px solid #fccd91;
      background: #fffcf5;
      font-family: inherit;
      box-shadow: 0 7px 0 #dfb27b;
      transition: 0.1s;
    }
    .eingabe-bereich input:focus {
      border-color: #fea83d;
      outline: none;
      background: #fffff0;
    }
    .btn {
      background: #ffdbb5;
      border: none;
      font-size: 1.7rem;
      padding: 1rem 2.2rem;
      border-radius: 60px;
      font-weight: 700;
      color: #513e26;
      border-bottom: 8px solid #c7a16b;
      cursor: pointer;
      transition: 0.07s linear;
      box-shadow: 0 7px 0 #b58f5a;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .btn:active {
      transform: translateY(7px);
      border-bottom-width: 2px;
      box-shadow: 0 2px 0 #b58f5a;
    }
    .btn:disabled {
      opacity: 0.5;
      transform: translateY(5px);
      border-bottom-width: 4px;
      pointer-events: none;
    }
    .feedback {
      font-size: 1.5rem;
      min-height: 4rem;
      background: #ffe6c0;
      border-radius: 40px;
      padding: 1rem 2rem;
      margin: 25px 0 10px;
      border: 3px solid #ffbc74;
      color: #324b3c;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: inset 0 -2px 0 #e7b67c;
    }
    .punkte-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
    }
    .score {
      background: #c4e2d0;
      border-radius: 50px;
      padding: 0.8rem 2rem;
      font-size: 1.8rem;
      font-weight: 700;
      color: #1e4b3b;
      border: 3px solid #8bb79b;
    }
    .next-btn {
      background: #b3d6c6;
      border-bottom: 8px solid #769b87;
      box-shadow: 0 7px 0 #5e7e6c;
    }
    .hilfe {
      background: #f2ebd2;
      border-radius: 30px;
      padding: 1rem 1.8rem;
      font-size: 1.2rem;
      color: #4f5d4a;
      border: 2px dotted #95ab92;
      margin-top: 20px;
    }
    .footer {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    /* mobil uyum */
    @media (max-width: 700px) {
      .aktueller-satz p { font-size: 1.7rem; }
      .btn { font-size: 1.3rem; padding: 0.8rem 1.5rem; }
    }
  </style>
</head>
<body>
<div class="spiel-wrapper">
  <div class="kopf">
    <h1><span>🐻‍❄️</span> Passiv · Zeitformen <span>⏳</span></h1>
    <div class="untertitel">Verwandle den Satz in die gewählte Zeit</div>
  </div>

  <div class="arena">
    <div class="aktueller-satz">
      <p id="baseSentence">Das Haus wird gebaut.</p>
    </div>

    <div class="zeit-wahl">
      <label for="tenseSelect">➡️ Zielzeit:</label>
      <select id="tenseSelect">
        <option value="praeteritum">Präteritum</option>
        <option value="perfekt">Perfekt</option>
        <option value="plusquamperfekt">Plusquamperfekt</option>
        <option value="futur1">Futur I</option>
        <option value="futur2">Futur II</option>
      </select>
    </div>

    <div class="eingabe-bereich">
      <input type="text" id="userInput" placeholder="z.B. Das Haus wurde gebaut." autocomplete="off">
      <button class="btn" id="checkBtn">✅ Prüfen</button>
    </div>

    <div class="feedback" id="feedbackArea">
      <span>🐣</span> <span id="feedbackText">Wähle eine Zeit und tippe die Lösung.</span>
    </div>

    <div class="punkte-container">
      <div class="score" id="scoreDisplay">🔰 0</div>
      <button class="btn next-btn" id="nextSentenceBtn">🌀 Nächster Satz</button>
    </div>

    <div class="hilfe">
      💡 Tipp: Achte auf das Hilfsverb (werden / sein) und das Partizip. Bei Perfekt: „… ist … worden“ (ohne ge-).
    </div>
  </div>

  <div class="footer">
    <span style="font-size:1.8rem;">🌸 B2 Passiv · alle Zeiten 🌸</span>
  </div>
</div>

<script>
  (function() {
    // ----- Datenbasis: Sätze im Präsens Passiv + alle Zeitformen -----
    const sentences = [
      {
        base: "Das Haus wird gebaut.",
        praeteritum: "Das Haus wurde gebaut.",
        perfekt: "Das Haus ist gebaut worden.",
        plusquamperfekt: "Das Haus war gebaut worden.",
        futur1: "Das Haus wird gebaut werden.",
        futur2: "Das Haus wird gebaut worden sein."
      },
      {
        base: "Der Brief wird geschrieben.",
        praeteritum: "Der Brief wurde geschrieben.",
        perfekt: "Der Brief ist geschrieben worden.",
        plusquamperfekt: "Der Brief war geschrieben worden.",
        futur1: "Der Brief wird geschrieben werden.",
        futur2: "Der Brief wird geschrieben worden sein."
      },
      {
        base: "Die Tür wird geöffnet.",
        praeteritum: "Die Tür wurde geöffnet.",
        perfekt: "Die Tür ist geöffnet worden.",
        plusquamperfekt: "Die Tür war geöffnet worden.",
        futur1: "Die Tür wird geöffnet werden.",
        futur2: "Die Tür wird geöffnet worden sein."
      },
      {
        base: "Das Auto wird repariert.",
        praeteritum: "Das Auto wurde repariert.",
        perfekt: "Das Auto ist repariert worden.",
        plusquamperfekt: "Das Auto war repariert worden.",
        futur1: "Das Auto wird repariert werden.",
        futur2: "Das Auto wird repariert worden sein."
      },
      {
        base: "Die Aufgabe wird gemacht.",
        praeteritum: "Die Aufgabe wurde gemacht.",
        perfekt: "Die Aufgabe ist gemacht worden.",
        plusquamperfekt: "Die Aufgabe war gemacht worden.",
        futur1: "Die Aufgabe wird gemacht werden.",
        futur2: "Die Aufgabe wird gemacht worden sein."
      },
      {
        base: "Das Lied wird gesungen.",
        praeteritum: "Das Lied wurde gesungen.",
        perfekt: "Das Lied ist gesungen worden.",
        plusquamperfekt: "Das Lied war gesungen worden.",
        futur1: "Das Lied wird gesungen werden.",
        futur2: "Das Lied wird gesungen worden sein."
      },
      {
        base: "Die Prüfung wird korrigiert.",
        praeteritum: "Die Prüfung wurde korrigiert.",
        perfekt: "Die Prüfung ist korrigiert worden.",
        plusquamperfekt: "Die Prüfung war korrigiert worden.",
        futur1: "Die Prüfung wird korrigiert werden.",
        futur2: "Die Prüfung wird korrigiert worden sein."
      },
      {
        base: "Der Kuchen wird gebacken.",
        praeteritum: "Der Kuchen wurde gebacken.",
        perfekt: "Der Kuchen ist gebacken worden.",
        plusquamperfekt: "Der Kuchen war gebacken worden.",
        futur1: "Der Kuchen wird gebacken werden.",
        futur2: "Der Kuchen wird gebacken worden sein."
      }
    ];

    // DOM elemente
    const baseSentenceEl = document.getElementById('baseSentence');
    const tenseSelect = document.getElementById('tenseSelect');
    const userInput = document.getElementById('userInput');
    const checkBtn = document.getElementById('checkBtn');
    const feedbackText = document.getElementById('feedbackText');
    const feedbackArea = document.getElementById('feedbackArea');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const nextBtn = document.getElementById('nextSentenceBtn');

    // Zustand
    let currentSentenceIndex = 0;         // index des aktuellen Satzes
    let score = 0;
    // Für jede Zeit merken, ob sie für den aktuellen Satz bereits richtig gelöst wurde (keine Mehrfachpunkte)
    let correctlyAnsweredTenses = new Set(); // z.B. { 'perfekt', 'futur1' }

    // Hilfsfunktion: zufälligen Satz auswählen (ohne den gleichen? egal, kann auch wiederholt werden)
    function pickRandomSentence() {
      const newIndex = Math.floor(Math.random() * sentences.length);
      currentSentenceIndex = newIndex;
      baseSentenceEl.textContent = sentences[currentSentenceIndex].base;
      // Zurücksetzen der bereits beantworteten Tenses
      correctlyAnsweredTenses.clear();
      // Eingabefeld leeren und Feedback neutralisieren
      userInput.value = '';
      feedbackText.innerHTML = '🐣 Neue Runde! Wähle eine Zeit und tippe.';
      // Optional den Select auf Präteritum stellen (oder einfach stehen lassen)
      tenseSelect.value = 'praeteritum';
    }

    // Normalisierung: trim, lower case, mehrere Leerzeichen → eines, Punkt am Ende optional entfernen
    function normalize(str) {
      return str
        .trim()
        .toLowerCase()
        .replace(/\s+/g, ' ')                // Mehrfachleerzeichen
        .replace(/\.$/, '')                   // Punkt am Ende entfernen
        .replace(/[^\w\säöüß]/g, '');         // grundsätzlich Satzzeichen entfernen (außer Buchstaben/Leerzeichen)
    }

    // Prüfen ob zwei Sätze inhaltlich gleich sind (tolerant)
    function isSameAnswer(user, correct) {
      return normalize(user) === normalize(correct);
    }

    // Aktuell ausgewählte Zeit aus dem Dropdown
    function getSelectedTense() {
      return tenseSelect.value; // 'praeteritum', 'perfekt', ...
    }

    // Korrekte Antwort für aktuellen Satz + gewählte Zeit
    function getCorrectAnswer() {
      const tense = getSelectedTense();
      return sentences[currentSentenceIndex][tense];
    }

    // Feedback anzeigen (mit Emoji)
    function setFeedback(message, isSuccess = false) {
      feedbackText.innerHTML = message;
      if (isSuccess) {
        feedbackArea.style.background = '#d8f0d0';
        feedbackArea.style.borderColor = '#7fc96b';
      } else {
        feedbackArea.style.background = '#ffe6c0';
        feedbackArea.style.borderColor = '#ffbc74';
      }
    }

    // Score updaten
    function updateScoreDisplay() {
      scoreDisplay.textContent = `🔰 ${score}`;
    }

    // Check-Button Handler
    function handleCheck() {
      const selectedTense = getSelectedTense();
      const correctAnswer = getCorrectAnswer();
      const userAnswer = userInput.value;

      if (!userAnswer.trim()) {
        setFeedback('🐢 Bitte etwas eintippen!', false);
        return;
      }

      // Prüfen ob diese Zeit für den aktuellen Satz bereits korrekt beantwortet wurde
      if (correctlyAnsweredTenses.has(selectedTense)) {
        setFeedback('⏳ Diese Zeit hast du schon richtig umgewandelt! Versuche eine andere Zeit oder klicke auf "Nächster Satz".', false);
        return;
      }

      if (isSameAnswer(userAnswer, correctAnswer)) {
        // Richtig!
        correctlyAnsweredTenses.add(selectedTense);
        score++;
        updateScoreDisplay();
        setFeedback(`🎉 Richtig!  " ${correctAnswer} "`, true);
        // Wenn alle 5 Zeiten geschafft? Extra-Lob
        if (correctlyAnsweredTenses.size === 5) {
          setFeedback(`🌟 Fantastisch! Alle 5 Zeiten gemeistert! 🌟`, true);
        }
      } else {
        setFeedback(`❌ Leider falsch. Versuch’s nochmal!`, false);
        // optional kleinen Hinweis? könnte zu viel sein
      }
    }

    // Event-Listener
    checkBtn.addEventListener('click', handleCheck);

    nextBtn.addEventListener('click', function() {
      pickRandomSentence();
      // Feedback zurücksetzen
      setFeedback('🐣 Neuer Satz! Viel Erfolg.', false);
    });

    // Enter-Taste im Inputfeld löst Prüfen aus
    userInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        checkBtn.click();
      }
    });

    // Beim Ändern der Zeit (Dropdown) Feedback zurücksetzen? optional
    tenseSelect.addEventListener('change', function() {
      // nichts erzwingen, nur Hinweis
      setFeedback(`🕰️ Jetzt: ${tenseSelect.options[tenseSelect.selectedIndex].text}`, false);
    });

    // Initialisierung: zufälligen Satz laden
    pickRandomSentence();
    updateScoreDisplay();

    // kleine Zusatzfunktion: wenn das Spiel zurückgesetzt werden müsste, kann man einfach die Seite neuladen. 
    // Aber wir können auch einen unsichtbaren Reset einbauen (zB Doppelklick auf Score setzt auf 0)
    scoreDisplay.addEventListener('dblclick', function() {
      if (confirm('Punktestand wirklich zurücksetzen?')) {
        score = 0;
        correctlyAnsweredTenses.clear();
        updateScoreDisplay();
        pickRandomSentence(); // auch neuen Satz
        setFeedback('🔁 Score zurückgesetzt. Neuer Satz!', false);
      }
    });
  })();
</script>
</body>
</html>
