<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B1 Indirekte Fragen Spiel</title>
<style>
body{
font-family: Arial, sans-serif;
background:linear-gradient(135deg,#f9a8d4,#93c5fd);
margin:0;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

h1{text-align:center}

.question{
background:#eef2ff;
padding:15px;
border-radius:10px;
margin-bottom:20px;
font-size:20px;
text-align:center;
}

textarea{
width:100%;
height:80px;
font-size:18px;
padding:10px;
border-radius:8px;
border:2px solid #ccc;
}

button{
margin-top:15px;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#4f46e5;
color:white;
cursor:pointer;
}

button:hover{background:#4338ca}

.feedback{margin-top:15px;font-weight:bold}

.words{
margin-top:20px;
padding:10px;
border-radius:8px;
background:#f3f4f6;
}

.word{
display:inline-block;
background:#6366f1;
color:white;
padding:6px 10px;
border-radius:6px;
margin:4px;
cursor:pointer;
font-size:14px;
}

.score{
margin-top:15px;
font-size:18px;
text-align:center;
}

.example{
margin-top:10px;
font-size:14px;
color:#444;
}

</style>
</head>
<body>

<div class="container">
<h1>🎮 B1 Indirekte Fragen Spiel</h1>

<div class="question" id="question"></div>

<textarea id="answer" placeholder="Kannst du mir sagen, ... ?"></textarea>

<button onclick="check()">Antwort prüfen</button>
<button onclick="next()">Nächste Frage</button>

<div class="feedback" id="feedback"></div>
<div class="example" id="example"></div>

<div class="words" id="words"></div>

<div class="score">⭐ Punkte: <span id="score">0</span></div>
</div>

<script>

const questions=[
{q:"Wo wohnst du?",a:"Kannst du mir sagen, wo du wohnst?"},
{q:"Wann beginnt der Kurs?",a:"Kannst du mir sagen, wann der Kurs beginnt?"},
{q:"Warum lernst du Deutsch?",a:"Kannst du mir sagen, warum du Deutsch lernst?"},
{q:"Wo arbeitest du?",a:"Kannst du mir sagen, wo du arbeitest?"},
{q:"Wie heißt dein Lehrer?",a:"Kannst du mir sagen, wie dein Lehrer heißt?"},
{q:"Wann kommt der Zug?",a:"Kannst du mir sagen, wann der Zug kommt?"},
{q:"Warum bist du müde?",a:"Kannst du mir sagen, warum du müde bist?"},
{q:"Wo kaufst du Lebensmittel?",a:"Kannst du mir sagen, wo du Lebensmittel kaufst?"},
{q:"Wie lange lernst du Deutsch?",a:"Kannst du mir sagen, wie lange du Deutsch lernst?"},
{q:"Wann hast du Geburtstag?",a:"Kannst du mir sagen, wann du Geburtstag hast?"}
];

const helperWords=["Kannst","du","mir","sagen","wo","wann","warum","wie","lange","du","arbeitest","wohnst","lernst","bist","kommt","beginnt"];

let current=0;
let score=0;

function load(){

let q=questions[current];

document.getElementById("question").innerText="Direkte Frage: "+q.q;

document.getElementById("answer").value="";

document.getElementById("feedback").innerText="";

document.getElementById("example").innerText="";

let wordsDiv=document.getElementById("words");
wordsDiv.innerHTML="💡 Hilfswörter: ";

helperWords.forEach(w=>{
let span=document.createElement("span");
span.className="word";
span.innerText=w;
span.onclick=()=>{
let textarea=document.getElementById("answer");
textarea.value+= (textarea.value?" ":"")+w;
};
wordsDiv.appendChild(span);
});

}

function check(){

let user=document.getElementById("answer").value.toLowerCase();
let correct=questions[current].a.toLowerCase();

if(user.includes("kannst du mir sagen") && user.includes("du")){
score+=10;
document.getElementById("feedback").innerHTML="✅ Gut! Das sieht nach einer indirekten Frage aus.";
document.getElementById("feedback").style.color="green";
}else{
document.getElementById("feedback").innerHTML="❌ Versuche die Struktur: Kannst du mir sagen, ...";
document.getElementById("feedback").style.color="red";
}

document.getElementById("example").innerText="Beispiel: "+questions[current].a;

document.getElementById("score").innerText=score;
}

function next(){
current++;

if(current>=questions.length){
alert("Spiel fertig! Punkte: "+score);
current=0;
score=0;
}

load();
}

load();

</script>

</body>
</html>
