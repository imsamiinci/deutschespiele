<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Almanca Oyun Bahçesi · Katalog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #fdeff2 0%, #f8e8e8 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* başlık ve filtre */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .header h1 {
            font-size: 3.2rem;
            font-weight: 700;
            color: #4a3b4f;
            letter-spacing: -0.5px;
            text-shadow: 3px 3px 0 #ffd9df;
            display: inline-block;
            padding: 0.2rem 1.2rem;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            box-shadow: 0 10px 20px rgba(242, 152, 170, 0.3);
            margin-bottom: 1.5rem;
        }
        .header h1 span {
            font-size: 2.8rem;
            display: inline-block;
            transform: rotate(5deg);
        }
        .search-box {
            max-width: 500px;
            margin: 0 auto 1rem;
            background: white;
            border-radius: 60px;
            padding: 0.3rem 0.3rem 0.3rem 1.8rem;
            box-shadow: 0 8px 16px #fec5ce;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 2px solid white;
        }
        .search-box i {
            font-size: 1.5rem;
            color: #e5989e;
        }
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.2rem;
            padding: 1rem 0;
            background: transparent;
            color: #4a3b4f;
        }
        .search-box input::placeholder {
            color: #e9b5bc;
            font-style: italic;
        }
        .search-box button {
            background: #e8a2aa;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #b05b66;
        }
        .search-box button:hover {
            background: #d68e98;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #b05b66;
        }

        /* oyun sayacı */
        .game-counter {
            background: #ffeef0;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            display: inline-block;
            font-weight: 500;
            color: #864d58;
            border: 2px dashed #e8a2aa;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        /* kategoriler ve kartlar */
        .categories {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }
        .category {
            background: rgba(255, 248, 250, 0.7);
            backdrop-filter: blur(3px);
            border-radius: 48px 48px 32px 32px;
            padding: 2rem 1.8rem;
            box-shadow: 0 15px 30px #f5cbd1;
            border: 2px solid white;
        }
        .category h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #643a46;
            margin-bottom: 1.2rem;
            padding-left: 1rem;
            border-left: 10px solid #fbb1b9;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category h2 span {
            background: white;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            font-size: 1.2rem;
            color: #b56576;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .game-card {
            background: white;
            border-radius: 28px;
            padding: 1.3rem 0.8rem;
            text-align: center;
            transition: all 0.2s ease;
            border: 3px solid transparent;
            box-shadow: 0 6px 12px rgba(230, 130, 150, 0.25);
            cursor: pointer;
            text-decoration: none;
            color: #4f3440;
            font-weight: 500;
            word-break: break-word;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .game-card:hover {
            transform: scale(1.02) translateY(-6px);
            border-color: #fba6b2;
            box-shadow: 0 15px 20px #f8abb7;
            background: #fff3f5;
        }
        .game-emoji {
            font-size: 2.4rem;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.1));
        }
        .game-name {
            font-size: 1rem;
            line-height: 1.4;
            max-width: 180px;
        }
        .no-games {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            background: #ffecf0;
            border-radius: 50px;
            color: #a76976;
            font-size: 1.3rem;
            border: 2px dashed #f5a3b0;
        }

        /* footer */
        .footer {
            margin-top: 4rem;
            text-align: center;
            color: #a77380;
            font-size: 1rem;
            border-top: 2px solid #ffd9df;
            padding-top: 2rem;
        }
        .footer a {
            color: #c96274;
            text-decoration: none;
            font-weight: 600;
        }
        .footer a:hover {
            text-decoration: underline;
        }

        /* mobil */
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .header h1 { font-size: 2.2rem; }
            .search-box { flex-wrap: wrap; padding: 0.5rem; }
            .search-box input { width: 100%; }
            .search-box button { width: 100%; }
            .category h2 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            <span>Schnell</span> Almanca Oyun Bahçesi <span>🎲</span>
        </h1>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Oyun ara (Türkçe/Almanca)..." autofocus>
            <button id="clearSearch">Temizle</button>
        </div>
        <div class="game-counter" id="counter">Toplam 0 oyun</div>
    </div>

    <div id="categoriesContainer" class="categories">
        <!-- Kategoriler ve oyun kartları buraya javascript ile doldurulacak -->
    </div>

    <div class="footer">
        ✨ Her oyun sürprizlerle dolu — tıkla, öğren, eğlen! ✨<br>
        <a href="#">🎮 Tüm oyunlar klasörlerinde /index.html ile hazır</a>
    </div>
</div>

<script>
    (function() {
        // ----- TÜM OYUNLAR (klasör adları, aynen verdiğin listeden) -----
        const rawGames = [
            "adjektiv deklination",
            "adjektivdeklination 2",
            "adjektivdeklination3",
            "adjektivdeklination4",
            "almanca artikel oyunu",
            "almanca-akkusativ-zamirler",
            "almanca-nicht-kein-oyunu",
            "almanca-zamirler-oyunu",
            "DATIV",
            "FUTUR 1 FUTUR 2",
            "genitiv",
            "indirektefragen",
            "iyelik-zamirleri-oyunu",
            "komparativ superlativ",
            "KONJUGATION",
            "KONUKTIV1",
            "konjuktiv2",
            "konjuktiv2 2",
            "konjuktiv2 3",
            "konnektoren",
            "LOKALE PREPOSITIONEN",
            "modalpartikeln",
            "MODALVERBEN",
            "Nominalisierung",
            "Partizipialattribute",
            "PASSIV",
            "PASSIV2",
            "PERFEKT",
            "POSSESSIV",
            "prateritum",
            "REDEMITTEL",
            "Relativsätze",
            "RENKLER",
            "umzu",
            "verben mit prepositionen2",
            "verben mit prepositionen",
            "W FRAGEN",
            "WECHSEL"
        ];

        // Her oyuna bir emoji ve kategori atayan fonksiyon (anahtar kelime tabanlı)
        function getGameMeta(gameName) {
            const lower = gameName.toLowerCase();

            // emoji belirleme (eğlenceli, tatlı)
            let emoji = '🎮';
            if (lower.includes('artikel')) emoji = '📦';
            else if (lower.includes('deklination') || lower.includes('adjektiv')) emoji = '🌈';
            else if (lower.includes('akkusativ')) emoji = '🎯';
            else if (lower.includes('dativ')) emoji = '🎁';
            else if (lower.includes('nicht') || lower.includes('kein')) emoji = '🚫';
            else if (lower.includes('zamir') || lower.includes('pronomen')) emoji = '👥';
            else if (lower.includes('futur')) emoji = '🔮';
            else if (lower.includes('indirekte') || lower.includes('fragen')) emoji = '❓';
            else if (lower.includes('iyelik') || lower.includes('possessiv')) emoji = '❤️';
            else if (lower.includes('komparativ') || lower.includes('superlativ')) emoji = '📊';
            else if (lower.includes('konjugation')) emoji = '🔄';
            else if (lower.includes('konjuktiv') || lower.includes('konuktiv')) emoji = '💭';
            else if (lower.includes('konnektoren')) emoji = '🔗';
            else if (lower.includes('prepositionen') || lower.includes('lokale') || lower.includes('wechs')) emoji = '📍';
            else if (lower.includes('modalpartikeln')) emoji = '✨';
            else if (lower.includes('modalverben')) emoji = '⚡';
            else if (lower.includes('nominalisierung')) emoji = '🏷️';
            else if (lower.includes('partizipial')) emoji = '📝';
            else if (lower.includes('passiv')) emoji = '🛡️';
            else if (lower.includes('perfekt')) emoji = '✅';
            else if (lower.includes('prateritum')) emoji = '⏳';
            else if (lower.includes('redemittel')) emoji = '💬';
            else if (lower.includes('relativ')) emoji = '🔄';
            else if (lower.includes('renkler')) emoji = '🎨';
            else if (lower.includes('umzu')) emoji = '🎯';
            else if (lower.includes('verben mit prepositionen')) emoji = '🔤';
            else if (lower.includes('w fragen')) emoji = '🤔';
            else if (lower.includes('wechel')) emoji = '🔄';

            // kategori atama
            let category = 'Diğer Konular';
            if (lower.includes('artikel')) category = '📦 Artikeller';
            else if (lower.includes('deklination')) category = '🌈 Sıfat Çekimi';
            else if (lower.includes('akkusativ') || lower.includes('dativ') || lower.includes('genitiv')) category = '🎯 İsim Halleri';
            else if (lower.includes('zamir') || lower.includes('pronomen')) category = '👥 Zamirler';
            else if (lower.includes('nicht') || lower.includes('kein')) category = '🚫 Olumsuzluk';
            else if (lower.includes('futur')) category = '🔮 Gelecek Zaman';
            else if (lower.includes('indirekte') || lower.includes('fragen')) category = '❓ Dolaylı Sorular';
            else if (lower.includes('iyelik') || lower.includes('possessiv')) category = '❤️ İyelik';
            else if (lower.includes('komparativ') || lower.includes('superlativ')) category = '📊 Karşılaştırma';
            else if (lower.includes('konjugation')) category = '🔄 Fiil Çekimi';
            else if (lower.includes('konjuktiv') || lower.includes('konuktiv')) category = '💭 Dilek Kipleri';
            else if (lower.includes('konnektoren')) category = '🔗 Bağlaçlar';
            else if (lower.includes('prepositionen') && !lower.includes('verben')) category = '📍 Edatlar';
            else if (lower.includes('lokale')) category = '📍 Yer Edatları';
            else if (lower.includes('wechs')) category = '🔄 Değişen Edatlar';
            else if (lower.includes('modalpartikeln')) category = '✨ Modal Partikeller';
            else if (lower.includes('modalverben')) category = '⚡ Modal Fiiller';
            else if (lower.includes('nominalisierung')) category = '🏷️ İsimleştirme';
            else if (lower.includes('partizipial')) category = '📝 Sıfat-Fiiller';
            else if (lower.includes('passiv')) category = '🛡️ Çatı (Passiv)';
            else if (lower.includes('perfekt')) category = '✅ Perfekt';
            else if (lower.includes('prateritum')) category = '⏳ Präteritum';
            else if (lower.includes('redemittel')) category = '💬 Konuşma İfadeleri';
            else if (lower.includes('relativ')) category = '🔄 İlgi Cümleleri';
            else if (lower.includes('renkler')) category = '🎨 Renkler';
            else if (lower.includes('umzu')) category = '🎯 um...zu Yapısı';
            else if (lower.includes('verben mit prepositionen')) category = '🔤 Edatlı Fiiller';
            else if (lower.includes('w fragen')) category = '🤔 Soru Kelimeleri';
            else if (lower.includes('wechel')) category = '🔄 Değişen Edatlar';

            return { emoji, category };
        }

        // Oyun listesini zenginleştir (her öğe için isim, kategori, emoji, link)
        const games = rawGames.map(name => {
            const { emoji, category } = getGameMeta(name);
            // Link: boşlukları URL dostu yap (encodeURIComponent ile)
            const folderName = name;  // olduğu gibi kullan, href'te encode edilecek
            return {
                name: name,
                displayName: name.charAt(0).toUpperCase() + name.slice(1), // ilk harf büyük
                category: category,
                emoji: emoji,
                link: `./${encodeURIComponent(name)}/index.html` // alt klasördeki index
            };
        });

        // Kategorilere göre grupla
        function groupByCategory(gameArray) {
            const grouped = {};
            gameArray.forEach(game => {
                const cat = game.category;
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(game);
            });
            // kategorileri alfabetik sırala (ama "Diğer Konular" en sona)
            const sortedKeys = Object.keys(grouped).sort((a,b) => {
                if (a.includes('Diğer')) return 1;
                if (b.includes('Diğer')) return -1;
                return a.localeCompare(b, 'tr');
            });
            const sortedGrouped = {};
            sortedKeys.forEach(key => { sortedGrouped[key] = grouped[key]; });
            return sortedGrouped;
        }

        // DOM arayüzünü çiz
        function renderGames(filterText = '') {
            const filterLower = filterText.toLowerCase().trim();
            let filteredGames = games;
            if (filterLower !== '') {
                filteredGames = games.filter(g => 
                    g.name.toLowerCase().includes(filterLower) || 
                    g.displayName.toLowerCase().includes(filterLower) ||
                    g.category.toLowerCase().includes(filterLower)
                );
            }

            const grouped = groupByCategory(filteredGames);
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';

            let totalShown = 0;
            for (const [category, gameList] of Object.entries(grouped)) {
                totalShown += gameList.length;
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.innerHTML = `
                    <h2>${category} <span>${gameList.length} oyun</span></h2>
                    <div class="game-grid" data-category="${category}"></div>
                `;
                const grid = categoryDiv.querySelector('.game-grid');
                gameList.forEach(game => {
                    const card = document.createElement('a');
                    card.href = game.link;
                    card.className = 'game-card';
                    card.innerHTML = `
                        <span class="game-emoji">${game.emoji}</span>
                        <span class="game-name">${game.displayName}</span>
                    `;
                    card.title = `${game.category} · oyunu aç`;
                    grid.appendChild(card);
                });
                container.appendChild(categoryDiv);
            }

            // Eğer hiç oyun yoksa özel mesaj
            if (totalShown === 0) {
                container.innerHTML = `<div class="no-games">😕 Hiç oyun bulunamadı. Farklı bir kelime dene!</div>`;
            }

            // sayaç güncelle
            document.getElementById('counter').innerText = `Toplam ${totalShown} oyun gösteriliyor`;
        }

        // Arama kutusu olayları
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearch');

        searchInput.addEventListener('input', (e) => {
            renderGames(e.target.value);
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            renderGames('');
        });

        // İlk yükleme
        renderGames('');

        // Tüm linklerin gerçekten var olan klasörleri işaret ettiğini varsıyoruz.
        // (Hata almamak için linkler tıklanabilir, klasör yoksa 404 alınır.)
    })();
</script>
</body>
</html>
